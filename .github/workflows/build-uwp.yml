name: Build UWP Benchmark App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2.0.0

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: msbuild -t:restore AppLaunchRnd.sln

    - name: Build and Package UWP App
      run: >
        msbuild AppLaunchRnd.sln 
        /p:Configuration=Release 
        /p:Platform=x64 
        /p:UapAppxPackageBuildMode=SideloadOnly 
        /p:AppxBundle=Always 
        /p:AppxBundlePlatforms="x64" 
        /p:GenerateAppInstallerFile=false

    - name: Upload UWP Package Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UWP-Benchmark-App
        path: AppLaunchRnd\AppPackages\
